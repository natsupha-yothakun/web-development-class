<body>
<h1>ณัฐสุภา โยธากุล (บลู) </h1>

<form name="form1" method="post" action="">

    <br>
    <label for="age">อายุ</label>
    <input type="text" name="age" id="age">
    <br>
    <label for="major">สาขาวิชา</label>
    <select name="major" id="major">
      <option value="การบัญชี">กาาบัญชี</option>
      <option value="การตลาด">การตลาด</option>
      <option value="ธุรกิจดิจิทังและระบบสารสนเทศ">ธุรกิจดิจิทังและระบบสารสนเทศ</option>
    </select>
  <br>
    <label for="color">สี</label>
  <input type="color" name="color" id="color">  
  <br>
    

    <label for="birthday">วันเดือนปีเกิด</label>
    <input type="date" name="birthday" id="birthday">
    <br>
    <input type="submit" name="button" id="button" value="Submit">
    <input type="reset" name="button2" id="button2" value="Reset">
    <input type="submit" name="button3" id="button3" value="สั่งพิมพ์">
    <input type="submit" name="button4" id="button4" value="มมส">
    <br>
    
</form>
