<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แบบฟอร์มสมัครสมาชิก</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .container {
            max-width: 700px;
            margin-top: 50px;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
            background-color: #ffffff;
        }
        .form-label {
            font-weight: bold;
        }
    </style>
</head>
<body>
<h1>ณัฐสุภา โยธากุล (บลู) </h1>
    <div class="container">
        <h2 class="text-center mb-4">แบบฟอร์มสมัครสมาชิก(GIMINI)</h2>
        <form>
            <div class="mb-3">
                <label for="fullName" class="form-label">ชื่อ-นามสกุล</label>
                <input type="text" class="form-control" id="fullName" placeholder="ป้อนชื่อ-นามสกุลของคุณ" required>
            </div>
            <div class="mb-3">
                <label for="phoneNumber" class="form-label">เบอร์โทรศัพท์</label>
                <input type="tel" class="form-control" id="phoneNumber" placeholder="ป้อนเบอร์โทรศัพท์ของคุณ" required>
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">อีเมล</label>
                <input type="email" class="form-control" id="email" placeholder="ป้อนอีเมลของคุณ" required>
            </div>
            <div class="mb-3">
                <label for="address" class="form-label">ที่อยู่</label>
                <textarea class="form-control" id="address" rows="3" placeholder="ป้อนที่อยู่ของคุณ"></textarea>
            </div>
            <div class="mb-3">
                <label for="dob" class="form-label">วันเดือนปีเกิด</label>
                <input type="date" class="form-control" id="dob" required>
            </div>
            <div class="mb-3">
                <label for="occupation" class="form-label">อาชีพ</label>
                <input type="text" class="form-control" id="occupation" placeholder="ป้อนอาชีพของคุณ">
            </div>
            <div class="mb-3">
                <label for="favoriteMovie" class="form-label">ภาพยนตร์ที่ชอบ</label>
                <input type="text" class="form-control" id="favoriteMovie" placeholder="ป้อนชื่อภาพยนตร์ที่คุณชอบ">
            </div>
            <div class="mb-3">
                <label for="profilePicture" class="form-label">รูปภาพโปรไฟล์</label>
                <input class="form-control" type="file" id="profilePicture" accept="image/*">
            </div>
            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-primary">สมัครสมาชิก</button>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
