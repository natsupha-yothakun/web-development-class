<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ฟอร์มสมัครสมาชิก</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<h1>ณัฐสุภา โยธากุล (บลู) </h1>
  <div class="container mt-5">
    <h2 class="mb-4">ฟอร์มสมัครสมาชิก(Chat GPT)</h2>
    <form>
      <div class="mb-3">
        <label for="fullname" class="form-label">ชื่อ - นามสกุล</label>
        <input type="text" class="form-control" id="fullname" placeholder="กรอกชื่อและนามสกุล">
      </div>

      <div class="mb-3">
        <label for="phone" class="form-label">เบอร์โทรศัพท์</label>
        <input type="tel" class="form-control" id="phone" placeholder="เช่น 0812345678">
      </div>

      <div class="mb-3">
        <label for="email" class="form-label">อีเมล</label>
        <input type="email" class="form-control" id="email" placeholder="example@email.com">
      </div>

      <div class="mb-3">
        <label for="address" class="form-label">ที่อยู่</label>
        <textarea class="form-control" id="address" rows="3" placeholder="กรอกที่อยู่"></textarea>
      </div>

      <div class="mb-3">
        <label for="dob" class="form-label">วันเดือนปีเกิด</label>
        <input type="date" class="form-control" id="dob">
      </div>

      <div class="mb-3">
        <label for="career" class="form-label">อาชีพ</label>
        <input type="text" class="form-control" id="career" placeholder="กรอกอาชีพ">
      </div>

      <div class="mb-3">
        <label for="favoriteMovie" class="form-label">ภาพยนตร์ที่ชอบ</label>
        <input type="text" class="form-control" id="favoriteMovie" placeholder="กรอกชื่อภาพยนตร์ที่ชอบ">
      </div>

      <div class="mb-3">
        <label for="profileImage" class="form-label">อัปโหลดรูปภาพ</label>
        <input class="form-control" type="file" id="profileImage">
      </div>

      <button type="submit" class="btn btn-primary">สมัครสมาชิก</button>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
